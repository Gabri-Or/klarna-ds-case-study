repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff-format
        types_or: [ python, pyi, jupyter ]
      - id: ruff-check
        types_or: [ python, pyi, jupyter ]
        args: [ --fix ]
        exclude: ^notebooks/

  - repo: https://github.com/kynan/nbstripout
    rev: 0.9.1
    hooks:
      - id: nbstripout

  # Secrets detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [ '--exclude-files', '(.*\.dvc$|MLmodel$)' ]
