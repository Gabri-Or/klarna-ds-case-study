requires-python = ">=3.12"
dependencies = [
    "pandera[polars]>=0.25.0",
    "polars>=1.41.2",
    "pyarrow>=16.0.0",
]

[dependency-groups]
dev = [
    "marimo>=0.23.9",
    "plotly>=6.8.0",
    "pre-commit>=4.6.0",
    "pydantic-ai>=1.107.0",
    "pytest>=8.4.0",
]
